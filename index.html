<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📖 EPUB Reader Offline – Mode Dua Halaman</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo-area">
                <span>📚</span>
                <h2>EPUB Reader</h2>
            </div>
            <div class="file-controls">
                <label class="file-label">
                    📂 Pilih File EPUB
                    <input type="file" id="epubInput" accept=".epub">
                </label>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn" title="Halaman sebelumnya" disabled>◀</button>
                    <button class="nav-btn" id="nextBtn" title="Halaman selanjutnya" disabled>▶</button>
                    <button class="toggle-dual" id="dualModeBtn">📖 Dua Halaman</button>
                    <button class="toggle-sidebar" id="toggleSidebarBtn">📑 Daftar Isi</button>
                    <!-- Kontrol Tampilan baru -->
                    <button class="toggle-display" id="displayBtn">🎨 Tampilan</button>
                </div>
            </div>
            <div class="book-info" id="bookMetaInfo">Belum ada buku dibuka</div>
        </div>

        <!-- Panel Pengaturan Tampilan (awalnya tersembunyi) -->
        <div id="displayPanel" style="display:none; background:#f0f0f0; padding:1rem; border-bottom:1px solid #ccc;">
            <div style="display:flex; flex-wrap:wrap; gap:1.5rem; align-items:center;">
                <label>Font: 
                    <select id="fontFamilySelect">
                        <option value='Georgia, "Times New Roman", serif'>Georgia</option>
                        <option value='"Segoe UI", Tahoma, sans-serif'>Segoe UI</option>
                        <option value='"Courier New", monospace'>Courier New</option>
                    </select>
                </label>
                <label>Ukuran: 
                    <input type="range" id="fontSizeSlider" min="12" max="24" value="16" step="1">
                    <span id="fontSizeValue">16px</span>
                </label>
                <label>Spasi baris: 
                    <input type="range" id="lineHeightSlider" min="1.2" max="2.5" value="1.6" step="0.1">
                    <span id="lineHeightValue">1.6</span>
                </label>
                <label>Margin: 
                    <input type="range" id="marginSlider" min="0.5" max="4" value="2" step="0.5">
                    <span id="marginValue">2 rem</span>
                </label>
                <label>
                    <input type="checkbox" id="nightModeCheckbox"> Mode Malam
                </label>
                <button id="resetDisplayBtn">Reset</button>
            </div>
        </div>

        <div class="main-layout">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-content">
                    <h3>📖 Daftar Isi</h3>
                    <div id="tocContainer">
                        <p style="color:#7f8c8d; font-style:italic;">Buka file EPUB untuk melihat daftar isi</p>
                    </div>
                </div>
            </aside>
            <div class="viewer-container">
                <iframe id="viewer" sandbox="allow-same-origin" style="display:none;"></iframe>
            </div>
        </div>
    </div>

    <!-- Pastikan tampilan.js dimuat lebih dulu -->
    <script src="tampilan.js"></script>
    <script src="script.js"></script>
</body>
</html>
